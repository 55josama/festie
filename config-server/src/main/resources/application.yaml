spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/55josama/festie.git
          default-label: dev

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health, refresh
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id:
      ${spring.cloud.client.hostname}:${spring.application.instance_id:${random.value}}