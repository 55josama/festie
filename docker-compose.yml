services:
  # ============ infra ============
  postgres:
    image: postgres:16
    container_name: festie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-festie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-festie}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-festie} -d ${POSTGRES_DB:-festie}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: festie-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ kafka ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: festie-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - festie-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: festie-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10

  # ============ zipkin ============
  zipkin:
    image: openzipkin/zipkin:3
    container_name: festie-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - festie-network

  # ============ config-server ============
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: festie-config
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - festie-network
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_USERNAME: ${CONFIG_USERNAME:-test}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD:-test}
      CONFIG_URL: ${CONFIG_URL}
      GIT_USERNAME: ${GIT_USERNAME}
      GIT_TOKEN: ${GIT_TOKEN}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/

  # ============ eureka-server ============
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: festie-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # 개발시 각자 복붙해서 추가 (경로 수정 후)
  # ============ chat-service ============
  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: festie-chat
    restart: unless-stopped
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB:-festie}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-festie}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ ai-service ============
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: festie-ai
    restart: unless-stopped
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB:-festie}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-festie}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ operation-service ============
  operation-service:
    build:
      context: .
      dockerfile: operation-service/Dockerfile
    container_name: festie-operation
    restart: unless-stopped
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB:-festie}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-festie}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ notification-service ============
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: festie-notification
    restart: unless-stopped
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB:-festie}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-festie}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

volumes:
  postgres_data:

networks:
  festie-network:
    driver: bridge
