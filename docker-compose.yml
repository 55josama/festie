services:
  # ============ infra ============
  # ============ data ============
  postgres:
    image: pgvector/pgvector:pg16
    container_name: festie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: festie-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ kafka ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: festie-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - festie-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: festie-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - festie-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: festie-kafka-ui
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - festie-network

  # ============ monitoring ============
  zipkin:
    image: openzipkin/zipkin:3
    container_name: festie-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - festie-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: festie-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - festie-network
    depends_on:
      chat-service:
        condition: service_started

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: festie-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - festie-network
    depends_on:
      prometheus:
        condition: service_started

  # ============ config-server ============
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: festie-config
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - festie-network
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_URL: ${CONFIG_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      GIT_USERNAME: ${GIT_USERNAME}
      GIT_TOKEN: ${GIT_TOKEN}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============ eureka-server ============
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: festie-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - festie-network
    environment:
      MANAGEMENT_ZIPKIN_TRACING_EXPORT_ENABLED: "false"
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # 개발시 각자 복붙해서 추가 (경로 수정 후)
  # ============ chat-service ============
  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: festie-chat
    restart: unless-stopped
    ports:
      - "8088:8088"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ ai-service ============
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: festie-ai
    restart: unless-stopped
    ports:
      - "8083:8083"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ operation-service ============
  operation-service:
    build:
      context: .
      dockerfile: operation-service/Dockerfile
    container_name: festie-operation
    restart: unless-stopped
    ports:
      - "8084:8084"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

  # ============ notification-service ============
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: festie-notification
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans
      HOST: ${HOST}
      PORT: ${PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

  # ============ event-service ============
  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: festie-event
    restart: unless-stopped
    ports:
      - "8082:8082"  # 테스트 시 사용
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

  # ============ community-service ============
  community-service:
    build:
      context: .
      dockerfile: community-service/Dockerfile
    container_name: festie-community
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 9001  # 테스트 시 사용
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

    # ============ favorite-service ============
  favorite-service:
    build:
      context: .
      dockerfile: favorite-service/Dockerfile
    container_name: festie-favorite
    restart: unless-stopped
    ports:
      - "8086:8086"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

    # ============ calendar-service ============
  calendar-service:
    build:
      context: .
      dockerfile: calendar-service/Dockerfile
    container_name: festie-calendar
    restart: unless-stopped
    ports:
      - "8087:8087"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: festie-redis
      EUREKA_SERVER_URL: http://festie-eureka:8761/eureka/
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans

    # ============ user-service ============
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: festie-user
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - festie-network
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8081
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CONFIG_USERNAME: ${CONFIG_USERNAME}
      CONFIG_PASSWORD: ${CONFIG_PASSWORD}

      SPRING_DATASOURCE_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_USER_BLACKLIST_STATUS: operation.blacklist.updated.v1

      USER_DB_URL: jdbc:postgresql://festie-postgres:5432/${POSTGRES_DB}
      USER_DB_USERNAME: ${POSTGRES_USER}
      USER_DB_PASSWORD: ${POSTGRES_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      ZIPKIN_ENDPOINT: http://festie-zipkin:9411/api/v2/spans


volumes:
  postgres_data:
  grafana_data:

networks:
  festie-network:
    driver: bridge
