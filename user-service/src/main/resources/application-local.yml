spring:
  cloud:
    config:
      enabled: false

  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/ojosama_db}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        show_sql: true

eureka:
  client:
    enabled: false