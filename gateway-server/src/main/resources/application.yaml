server:
  port: 8085

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                  - "http://localhost:8088"
                  - "http://127.0.0.1:8088"
                  - "${CORS_ALLOWED_ORIGIN:https://tubular-treacle-b17eba.netlify.app}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user-service/**
              filters:
                - StripPrefix=1

            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/chat-service/**
              filters:
                - StripPrefix=1

            - id: operation-service
              uri: lb://operation-service
              predicates:
                - Path=/operation-service/**
              filters:
                - StripPrefix=1

            - id: event-service
              uri: lb://event-service
              predicates:
                - Path=/event-service/**
              filters:
                - StripPrefix=1

            - id: community-service
              uri: lb://community-service
              predicates:
                - Path=/community-service/**
              filters:
                - StripPrefix=1

            - id: favorite-service
              uri: lb://favorite-service
              predicates:
                - Path=/favorite-service/**
              filters:
                - StripPrefix=1

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notification-service/**
              filters:
                - StripPrefix=1

            - id: calendar-service
              uri: lb://calendar-service
              predicates:
                - Path=/calendar-service/**
              filters:
                - StripPrefix=1

            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/ai-service/**
              filters:
                - StripPrefix=1

            # ==========================================
            # Swagger API 명세서 전용 라우트
            # ==========================================
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/docs/user-service/**
              filters:
                - RewritePath=/docs/user-service/(?<segment>.*), /$\{segment}

            - id: chat-service-docs
              uri: lb://chat-service
              predicates:
                - Path=/docs/chat-service/**
              filters:
                - RewritePath=/docs/chat-service/(?<segment>.*), /$\{segment}

            - id: operation-service-docs
              uri: lb://operation-service
              predicates:
                - Path=/docs/operation-service/**
              filters:
                - RewritePath=/docs/operation-service/(?<segment>.*), /$\{segment}

            - id: event-service-docs
              uri: lb://event-service
              predicates:
                - Path=/docs/event-service/**
              filters:
                - RewritePath=/docs/event-service/(?<segment>.*), /$\{segment}

            - id: community-service-docs
              uri: lb://community-service
              predicates:
                - Path=/docs/community-service/**
              filters:
                - RewritePath=/docs/community-service/(?<segment>.*), /$\{segment}

            - id: favorite-service-docs
              uri: lb://favorite-service
              predicates:
                - Path=/docs/favorite-service/**
              filters:
                - RewritePath=/docs/favorite-service/(?<segment>.*), /$\{segment}

            - id: notification-service-docs
              uri: lb://notification-service
              predicates:
                - Path=/docs/notification-service/**
              filters:
                - RewritePath=/docs/notification-service/(?<segment>.*), /$\{segment}

            - id: calendar-service-docs
              uri: lb://calendar-service
              predicates:
                - Path=/docs/calendar-service/**
              filters:
                - RewritePath=/docs/calendar-service/(?<segment>.*), /$\{segment}

            - id: ai-service-docs
              uri: lb://ai-service
              predicates:
                - Path=/docs/ai-service/**
              filters:
                - RewritePath=/docs/ai-service/(?<segment>.*), /$\{segment}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://festie-zipkin:9411/api/v2/spans}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 유저 서비스 (User)
        url: /docs/user-service/v3/api-docs
      - name: 채팅 서비스 (Chat)
        url: /docs/chat-service/v3/api-docs
      - name: 운영 서비스 (Operation)
        url: /docs/operation-service/v3/api-docs
      - name: 행사 서비스 (Event)
        url: /docs/event-service/v3/api-docs
      - name: 커뮤니티 서비스 (Community)
        url: /docs/community-service/v3/api-docs
      - name: 찜 서비스 (Favorite)
        url: /docs/favorite-service/v3/api-docs
      - name: 알림 서비스 (Notification)
        url: /docs/notification-service/v3/api-docs
      - name: 일정 서비스 (Calendar)
        url: /docs/calendar-service/v3/api-docs
      - name: AI 서비스 (Ai)
        url: /docs/ai-service/v3/api-docs