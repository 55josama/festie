server:
  port: 8085

spring:
  application:
    name: gateway-server

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user-service/**
              filters:
                - StripPrefix=1

            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/chat-service/**
              filters:
                - StripPrefix=1

            - id: operation-service
              uri: lb://operation-service
              predicates:
                - Path=/operation-service/**
              filters:
                - StripPrefix=1

            - id: event-service
              uri: lb://event-service
              predicates:
                - Path=/event-service/**
              filters:
                - StripPrefix=1

            - id: community-service
              uri: lb://community-service
              predicates:
                - Path=/community-service/**
              filters:
                - StripPrefix=1

            - id: favorite-service
              uri: lb://favorite-service
              predicates:
                - Path=/favorite-service/**
              filters:
                - StripPrefix=1

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notification-service/**
              filters:
                - StripPrefix=1

            - id: calendar-service
              uri: lb://calendar-service
              predicates:
                - Path=/calendar-service/**
              filters:
                - StripPrefix=1

            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/ai-service/**
              filters:
                - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/