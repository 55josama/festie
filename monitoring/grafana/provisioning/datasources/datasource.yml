apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://festie-influxdb:8086
    editable: true
    jsonData:
      dbName: jmeter
      version: InfluxQL
