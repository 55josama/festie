name: festie-ci.yml
on:
  pull_request:
    branches: [ "dev" ]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        services:
          - ai-service
          - calendar-service
          - chat-service
          - community-service
          - config-service
          - eureka-service
          - event-service
          - favorites-service
          - notification-service
          - operation-service
          - user-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changed files # 변경된 부분이 있는지 확인
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.services }}/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.filter.outputs.changed == 'true'
        run: chmod +x gradlew

      - name: Build and test
        if: steps.filter.outputs.changed == 'true'
        run: ./gradlew :${{ matrix.services }}:clean :${{ matrix.services }}:build -x test # 테스트 코드는 무시

        
